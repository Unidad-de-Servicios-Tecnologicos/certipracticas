server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version
    server_tokens off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Long cache for hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ----- Security headers -----
    # Strict transport security (asume despliegue detrás de TLS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Content Security Policy
    # - script-src 'self': solo bundles propios (no inline, no eval)
    # - style-src 'unsafe-inline': React inyecta estilos inline; Tailwind v4 también
    # - img-src data:/blob:: html-to-image y previsualización
    # - connect-src: solo Gemini API (cambiar si se usa otro proveedor)
    # - frame-ancestors 'none': bloquea clickjacking
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://generativelanguage.googleapis.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests" always;

    # Permissions Policy: solo permitir micrófono (dictado por voz)
    add_header Permissions-Policy "microphone=(self), camera=(), geolocation=(), payment=(), usb=()" always;

    # Otros headers clásicos
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Bloquear archivos sensibles
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }
}
